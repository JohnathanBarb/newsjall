repos:
    - repo: local
      hooks:
          - id: format
            name: Format code with Ruff
            entry: make format
            language: system
            types: [python]
            require_serial: true
            pass_filenames: false

          - id: typecheck
            name: Run MyPy
            entry: make typecheck
            language: system
            types: [python]
            require_serial: true
            pass_filenames: false
